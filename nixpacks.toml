# Railway Nixpacks 备用（面板 Builder 选 Nixpacks 时使用）
providers = ["node"]

[variables]
NODE_ENV = "production"
PNPM_IGNORE_ENGINE = "true"
DATABASE_TYPE = "sqlite"
# 必须配合 Volume 挂载到 /data
DATABASE_URL = "file:/data/wewe-rss.db"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm i -g pnpm@9.15.9", "pnpm install --no-frozen-lockfile --ignore-scripts"]

[phases.build]
cmds = [
  "cd apps/server && pnpm exec prisma generate --schema ./prisma/schema.prisma",
  "pnpm --filter web build",
  "pnpm --filter server build"
]

[start]
cmd = "cd apps/server && sh docker-bootstrap.sh"
